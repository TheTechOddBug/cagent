# Lints the documentation source in docs/**: markdownlint for style
# and lychee (offline) to verify that every relative Markdown link
# resolves to a real file. Portable relative links are what the Hugo
# module mount on docs.docker.com resolves, so broken ones would break
# the downstream build (see docs-upstream.yml).
name: docs-lint

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs-lint.yml"
      - "docs/**"
  pull_request:
    paths:
      - ".github/workflows/docs-lint.yml"
      - "docs/**"

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          config: docs/.markdownlint-cli2.yaml
          globs: docs/**/*.md

  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check relative links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          # index.md and 404.md are github.io-only pages that keep Jekyll
          # Liquid links; the muffet check (task docs-check-links) covers
          # them on the rendered site.
          args: >-
            --offline --no-progress --include-verbatim=false
            --exclude-path docs/index.md --exclude-path docs/404.md
            "docs/**/*.md"
          fail: true
