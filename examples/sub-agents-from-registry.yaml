# This example demonstrates using agents from OCI registries as sub-agents.
# Sub-agents can be defined locally in the same config, or referenced from
# external sources such as any OCI-compatible registry.
#
# External sub-agents are automatically named after their last path segment
# without the tag (e.g., "myorg/agent:tag" becomes "agent"). You can also give
# them an explicit name using the "name:reference" syntax:
#   - reviewer:myorg/review-pr
#
# Tag references (like "myorg/agent:tag" below) are re-resolved against the
# registry on every run, even when the sub-agent is never used. Pin to a digest
# to serve from cache and skip that lookup:
#   - myorg/agent@sha256:<digest>

models:
  model:
    provider: openai
    model: gpt-4o

agents:
  root:
    model: model
    description: Coordinator that delegates to local and external sub-agents
    instruction: |
      You are a coordinator agent. You have access to both local and external sub-agents.

      - Use the "local_helper" agent for simple tasks.
      - Use the "agent" sub-agent (pulled from the registry) for everything else.

      Delegate tasks to the most appropriate sub-agent based on the user's request.
    sub_agents:
      - local_helper
      - myorg/agent:tag

  local_helper:
    model: model
    description: A local helper agent for simple tasks
    instruction: |
      You are a helpful assistant that answers questions concisely.
